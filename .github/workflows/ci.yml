name: ARESLib2 CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    # Required permissions for the jacoco-report action to comment on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Build with Gradle and generate JaCoCo Coverage
      run: ./gradlew build jacocoTestReport

    - name: Add JaCoCo coverage report to PR
      uses: madrapps/jacoco-report@v1.6.1
      with:
        paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 50
        min-coverage-changed-files: 60
        title: "ARESLib2 Coverage Report"
        update-comment: true
