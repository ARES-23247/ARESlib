name: ARESLib2 CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Required permissions for the jacoco-report action to comment on the PR
    permissions:
      contents: read
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'corretto'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Build with Gradle and generate JaCoCo Coverage
      run: ./gradlew build jacocoTestReport

    - name: Upload Test Reports
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: test-reports
        path: build/reports/tests/test/

    - name: Verify Code Formatting
      run: git diff --exit-code || (echo "Code formatting is incorrect. Spotless modified files. Please format locally before pushing." && exit 1)

    - name: Add JaCoCo coverage report to PR
      uses: madrapps/jacoco-report@v1.6.1
      if: github.event_name == 'pull_request'
      with:
        paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 50
        min-coverage-changed-files: 60
        title: "ARESLib2 Coverage Report"
        update-comment: true
